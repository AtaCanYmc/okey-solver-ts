name: Deploy Web Demo to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# GitHub Pages'e yazma izni
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda yalnızca bir deploy çalışsın; devam eden deploy iptal edilmez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 1. Test & Build ─────────────────────────────────────────────────────────
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

  # ── 2. Deploy (sadece main/master push'larında) ──────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: test
    # Yalnızca push event'inde (PR'larda değil) çalış
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload demo artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sadece web-demo klasörünü yayınla
          path: ./examples/web-demo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
